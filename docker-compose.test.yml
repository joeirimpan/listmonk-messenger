# fakecloud mock AWS for integration tests.
#   docker compose -f docker-compose.test.yml up -d
#   go test -tags=integration ./messenger/...
#   docker compose -f docker-compose.test.yml down
services:
  fakecloud:
    image: ghcr.io/faiscadev/fakecloud:latest
    ports:
      - "4566:4566"
    environment:
      - FAKECLOUD_ADDR=0.0.0.0:4566
      - FAKECLOUD_REGION=us-east-1
      - FAKECLOUD_LOG=info
    healthcheck:
      test: ["CMD", "fakecloud", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 12
